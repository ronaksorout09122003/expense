spring.application.name=expense-backend
server.port=${SERVER_PORT:8080}

app.storage.base-dir=${EXPENSE_DATA_DIR:${user.home}/expense-data}
spring.datasource.url=jdbc:h2:file:${app.storage.base-dir}/expense;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=${EXPENSE_H2_CONSOLE_ENABLED:true}
spring.h2.console.path=/h2-console

spring.jackson.serialization.write-dates-as-timestamps=false

springdoc.swagger-ui.path=/swagger-ui.html

app.security.jwt-secret=ZmluYW5jZS1sZWRnZXItcHJvLWp3dC1zZWNyZXQtbXVzdC1iZS1sb25nLWVuYWlyb3VnaC10by1rZWVwLWRlbW8tc2FmZQ==
app.security.jwt-expiration-hours=16
app.seed-demo=${EXPENSE_SEED_DEMO:true}
app.cors.allowed-origin-patterns=http://localhost:*,http://127.0.0.1:*

#---
spring.config.activate.on-profile=postgres

spring.datasource.url=${POSTGRES_URL:jdbc:postgresql://localhost:5432/expense_app}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${POSTGRES_USER:postgres}
spring.datasource.password=${POSTGRES_PASSWORD:4564}

spring.h2.console.enabled=false
