spring.application.name=expense-backend
server.port=${PORT:8080}

app.storage.base-dir=${EXPENSE_DATA_DIR:${user.home}/expense-data}

# Single datasource config so Render doesn't see repeated env-style keys
spring.datasource.url=${JDBC_DATABASE_URL:${POSTGRES_URL:jdbc:h2:file:${app.storage.base-dir}/expense;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;DB_CLOSE_DELAY=-1;AUTO_SERVER=TRUE}}
spring.datasource.driver-class-name=${DB_DRIVER:${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}}
spring.datasource.username=${JDBC_DATABASE_USERNAME:${POSTGRES_USER:sa}}
spring.datasource.password=${JDBC_DATABASE_PASSWORD:${POSTGRES_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Kolkata

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.h2.console.enabled=${EXPENSE_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

spring.jackson.serialization.write-dates-as-timestamps=false

springdoc.swagger-ui.path=/swagger-ui.html

app.security.jwt-secret=${JWT_SECRET:ZmluYW5jZS1sZWRnZXItcHJvLWp3dC1zZWNyZXQtbXVzdC1iZS1sb25nLWVuYWlyb3VnaC10by1rZWVwLWRlbW8tc2FmZQ==}
app.security.jwt-expiration-hours=${JWT_EXPIRATION_HOURS:16}
app.seed-demo=${EXPENSE_SEED_DEMO:true}
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:*,http://127.0.0.1:*}
